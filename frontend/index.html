<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mammas Bokliste</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<h1>Mammas Bokliste</h1>

<input type="text" id="searchInput" placeholder="Søk tittel eller forfatter...">

<button id="toggleAddBook" class="toggle-addbook">+</button>

<div id="addBook" class="addbook-container">
    <h3>Legg til ny bok</h3>

    <input id="newTitle" placeholder="Tittel"><br>
    <input id="newAuthor" placeholder="Forfatter"><br>
    <input id="newSeries" placeholder="Serie (valgfritt)"><br>
    <input id="newNumber" placeholder="Nummer (valgfritt)" type="number"><br>

    Har lest:
    <input type="checkbox" id="newRead">

    | Har boka:
    <input type="checkbox" id="newOwned">

    <br>
    <input id="newComment" placeholder="Kommentar (valgfritt)"><br><br>

    <button id="addBookBtn">Legg til bok</button>
</div>



<div id="bookList"></div>


<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<script src="script.js"></script>
</body>
</html>
